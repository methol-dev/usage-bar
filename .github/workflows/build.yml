name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            macos/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('macos/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Run tests
        run: cd macos && swift test

      - name: Build app archives
        run: make release-artifacts

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: UsageBar.zip
          path: macos/UsageBar.zip

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: UsageBar.dmg
          path: macos/UsageBar.dmg

  extension:
    # Chrome 扩展是纯前端，用 Node 做轻量校验（不占 macOS runner 配额）。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json','utf8'))"
      - name: Syntax-check extension scripts
        run: node --check extension/background.js && node --check extension/popup.js
