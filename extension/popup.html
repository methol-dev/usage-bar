<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font: 13px -apple-system, system-ui, sans-serif; width: 260px; margin: 0; padding: 12px; }
      h1 { font-size: 13px; margin: 0 0 6px; }
      p { color: #666; margin: 0 0 10px; line-height: 1.4; }
      button { font: inherit; padding: 5px 10px; cursor: pointer; }
      #status { margin-top: 10px; color: #444; min-height: 1.2em; }
      #lastSync { margin-top: 8px; color: #888; font-size: 12px; }
      #channel { margin-top: 4px; color: #888; font-size: 12px; }
      @media (prefers-color-scheme: dark) {
        body { background: #1e1e1e; color: #ddd; }
        p { color: #aaa; } #status { color: #bbb; } #lastSync { color: #999; } #channel { color: #999; }
      }
    </style>
  </head>
  <body>
    <h1>UsageBar — Web Usage</h1>
    <p>Reads your claude.ai and chatgpt.com usage in your own signed-in sessions. Cookies and tokens never leave the browser. Syncs automatically — this button just forces one now.</p>
    <button id="sync">Sync now</button>
    <div id="status"></div>
    <div id="lastSync"></div>
    <div id="channel"></div>
    <script src="popup.js"></script>
  </body>
</html>
